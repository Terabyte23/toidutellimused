name: CI Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test, build, lint]
    if: github.ref == 'refs/head/master'
    steps:
      - name: Lae kood alla
        uses: actions/checkout@v4

      - name: Teata adukast deployst
        run: |
          echo "Kõik testid läbisid!"
          echo "Rakendes on valmis"
          echo "Keskkond: prodution"
          echo "Commit: ${{ github.sha }}"
  build:
    name: Docker build kontroll
    runs-on: ubuntu-latest
    steps:
      - name: Lae kood alla
        uses: actions/checkout@v4

      - name: Ehita dev image
        run: docker compose --profile dev build

      - name: Ehita prod image
        run: docker compose --profile prod build
  lint:
    name: Koodi kontroll
    runs-on: ubuntu-latest
    steps:
      - name: Lae kood alla
        uses: actions/checkout@v4

      - name: Paigalda Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Paigalda sõltuvused
        run: npm install

      - name: Kontrolli ühtakse vigu
        run: node --check src/server.js src/users.js src/routes/menu.js

  test:
    name: Automaattestid
    runs-on: ubuntu-latest
    steps:
      - name: Lae kood alla
        uses: actions/checkout@v4

      - name: Paigalda Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Paigalda sõltuvused
        run: npm install

      - name: Käivitame rakenduse
        run: node src/server.js &

      - name: Oota kuni server käivitub
        run: sleep 3

      - name: Käivitame testid
        run: node src/test.js
